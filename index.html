<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MGIT - Dynamic Examination Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    padding: 20px;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
    color: #fff;
    min-height: 100vh;
}
.container { max-width: 850px; margin: 0 auto; padding-bottom: 60px; }
.header {
    background: linear-gradient(135deg, #000814, #001d3d, #003566);
    padding: 25px;
    border-radius: 14px;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 25px;
}
h1 {
    font-size: 28px;
    background: linear-gradient(90deg, #ffffff, #ffe082, #ffffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color:transparent;
    margin-bottom: 6px;
}
.section-title {
    font-size: 20px;
    margin: 30px 0 15px 0;
    padding-bottom: 5px;
    border-bottom: 2px solid #00bcff;
    color: #00f5d4;
}
.question-card {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 18px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.question-text { font-size: 15px; font-weight: 600; margin-bottom: 14px; line-height: 1.4; }
.option-item {
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    font-size: 14px;
}
.option-item input { margin-right: 12px; accent-color: #00bcff; width: 16px; height: 16px; }
.correct-style { background: rgba(56, 176, 0, 0.15) !important; border-color: #38b000 !important; color: #00ff66 !important; font-weight: bold; }
.incorrect-style { background: rgba(211, 47, 47, 0.15) !important; border-color: #d32f2f !important; color: #ff5252 !important; }
.explanation-box {
    margin-top: 12px; padding: 10px 12px; background: rgba(0, 0, 0, 0.3);
    border-left: 3px solid #ffd166; border-radius: 4px; font-size: 13px; color: #ffe082; display: none;
}
.action-bar { text-align: center; margin-top: 30px; }
.submit-btn {
    background: linear-gradient(135deg, #00bcff, #0072ff); color: #fff;
    padding: 12px 35px; font-size: 16px; font-weight: bold; border: none;
    border-radius: 25px; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 188, 255, 0.4);
}
.result-banner {
    display: none; background: linear-gradient(135deg, #051329, #0a2246);
    border: 1px solid #ffd166; border-radius: 10px; padding: 20px; text-align: center; margin-top: 25px;
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Practice Evaluation Board</h1>
        <p style="color: #b2ff59; font-size: 14px; font-weight: 500;">Automated Multi-Subject Engine</p>
    </div>

    <form id="quizForm" onsubmit="evaluateQuiz(event)">
        <div id="dynamicQuestionsContainer"></div>

        <div class="action-bar">
            <button type="submit" class="submit-btn">💥 Submit Examination Paper</button>
        </div>
    </form>

    <div id="resultBanner" class="result-banner">
        <h3 id="bannerTitle">Exam Summary Analysis</h3>
        <p id="scoreDisplay"></p>
    </div>
</div>

<script>
// ==========================================
// 📋 PASTE YOUR 100+ QUESTIONS DATA HERE BELOW
// ==========================================
const examQuestions = [
    {
        section: "Arithmetic Aptitude",
        question: "A train running at the speed of 60 km/hr crosses a pole in 9 seconds. What is the length of the train?",
        options: { A: "120 meters", B: "180 meters", C: "150 meters", D: "324 meters" },
        correct: "C",
        explanation: "Speed = 60 * (5/18) = 50/3 m/sec. Length = Speed * Time = (50/3) * 9 = 150 meters."
    },
    {
        section: "Arithmetic Aptitude",
        question: "The average of 20 numbers is calculated as 35. It was discovered later that a number 85 was misread as 45. What is the correct average?",
        options: { A: "36.5", B: "37.0", C: "35.5", D: "38.0" },
        correct: "B",
        explanation: "Difference = 85 - 45 = 40. Increase in average = 40 / 20 = 2. Correct Average = 35 + 2 = 37."
    },
    {
        section: "Technical & Core Computing",
        question: "In JavaScript, which array method returns a brand new collection containing elements that pass a specific conditional criteria block?",
        options: { A: "array.map()", B: "array.forEach()", C: "array.filter()", D: "array.reduce()" },
        correct: "C",
        explanation: "array.filter() loops through a collection and creates a shallow copy array populated only with matching values."
    }
    // You can seamlessly drop up to 100+ items here following this clean object template
];

// ==========================================
// 🛠️ ENGINE MECHANICS: DO NOT TOUCH BELOW
// ==========================================
window.addEventListener('DOMContentLoaded', () => {
    renderQuestions();
});

function renderQuestions() {
    const container = document.getElementById("dynamicQuestionsContainer");
    let currentSection = "";
    let htmlOutput = "";

    examQuestions.forEach((q, index) => {
        const qNum = index + 1;
        
        // Dynamic section boundary headers generator
        if (q.section !== currentSection) {
            currentSection = q.section;
            htmlOutput += `<h2 class="section-title">${currentSection}</h2>`;
        }

        htmlOutput += `
            <div class="question-card" data-correct="${q.correct}">
                <p class="question-text">Q${qNum}. ${q.question}</p>
                <div class="options-list">
                    <label class="option-item"><input type="radio" name="q_${qNum}" value="A"> A) ${q.options.A}</label>
                    <label class="option-item"><input type="radio" name="q_${qNum}" value="B"> B) ${q.options.B}</label>
                    <label class="option-item"><input type="radio" name="q_${qNum}" value="C"> C) ${q.options.C}</label>
                    <label class="option-item"><input type="radio" name="q_${qNum}" value="D"> D) ${q.options.D}</label>
                </div>
                <div class="explanation-box">💡 <strong>Explanation:</strong> ${q.explanation}</div>
            </div>`;
    });

    container.innerHTML = htmlOutput;
}

function evaluateQuiz(event) {
    event.preventDefault();
    let cards = document.querySelectorAll(".question-card");
    let score = 0;

    cards.forEach((card, index) => {
        let correctAnswer = card.getAttribute("data-correct");
        let selectedInput = card.querySelector(`input[type="radio"]:checked`);
        let optionLabels = card.querySelectorAll(".option-item");
        let explanation = card.querySelector(".explanation-box");

        optionLabels.forEach(label => label.classList.remove("correct-style", "incorrect-style"));

        optionLabels.forEach(label => {
            if (label.querySelector('input').value === correctAnswer) label.classList.add("correct-style");
        });

        if (selectedInput) {
            if (selectedInput.value === correctAnswer) {
                score++;
            } else {
                selectedInput.parentElement.classList.add("incorrect-style");
            }
        }
        if (explanation) explanation.style.display = "block";
    });

    let banner = document.getElementById("resultBanner");
    let display = document.getElementById("scoreDisplay");
    let percentage = ((score / cards.length) * 100).toFixed(1);
    display.innerHTML = `You correctly answered <strong>${score}</strong> out of <strong>${cards.length}</strong> questions.<br>Final Score: <strong>${percentage}%</strong>`;
    banner.style.display = "block";
    banner.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>

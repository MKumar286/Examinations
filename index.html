<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MGIT - Secure Examination Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    padding: 15px;
    padding-bottom: 80px; 
    overflow-x: hidden;
    color: white;
    background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c3c);
    background-size: 400% 400%;
    animation: bgMove 15s ease infinite;
    min-height: 100vh;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container { max-width: 900px; margin: 0 auto; padding-bottom: 60px; position: relative; }

/* ⏱️ Pinned Top-Right Corner Countdown Timer */
.timer-box {
    position: fixed;
    top: 20px;
    right: 20px;
    background: linear-gradient(135deg, #000814, #001d3d);
    border: 2px solid #ff9f1c;
    padding: 10px 18px;
    border-radius: 30px;
    box-shadow: 0 6px 25px rgba(0,0,0,0.5);
    font-size: 16px;
    font-weight: bold;
    color: #ff9f1c;
    z-index: 2000;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 1px;
}

.header-box {
    background: linear-gradient(135deg, #000814, #001d3d, #003566);
    padding: 15px 10px;
    border-radius: 18px 18px 0 0;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.15);
}

h1 {
    font-size: 34px;
    font-weight: bold;
    background: linear-gradient(90deg, #ffffff, #ffe082, #ffffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
}

/* 📊 Stats Counter Dashboard Grid Panel */
.stats-container {
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #051329, #0a2246);
    padding: 10px;
    border-left: 1px solid rgba(255,255,255,0.15);
    border-right: 1px solid rgba(255,255,255,0.15);
    border-bottom: 1px solid rgba(255,255,255,0.15);
    border-radius: 0 0 18px 18px;
    gap: 8px;
    margin-bottom: 25px;
}

.stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 8px;
    width: 100%;
}

.stats-card {
    background: rgba(255, 255, 255, 0.06);
    border-radius: 8px;
    padding: 6px 8px;
    font-size: 11px;
    line-height: 1.2;
    color: #e0e6ed;
    display: flex;
    flex-direction: column;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    min-height: 52px;
}

.stats-card span {
    font-weight: bold;
    font-size: 15px;
    margin-top: 2px;
}

.border-blue { border: 1px solid #00bcff; }
.border-blue span { color: #00bcff; }
.border-cyan { border: 1px solid #00f5d4; }
.border-cyan span { color: #00f5d4; }
.border-green { border: 1px solid #38b000; background: rgba(56, 176, 0, 0.08); }
.border-green span { color: #00ff66; text-shadow: 0 0 8px rgba(0,255,102,0.4); }

.section-title {
    font-size: 22px;
    margin: 35px 0 15px 0;
    padding-bottom: 6px;
    border-bottom: 2px solid #00bcff;
    color: #00f5d4;
}

/* ⚪ Crisp Question Cards Design */
.question-card {
    background: #ffffff;
    border-radius: 12px;
    padding: 22px;
    margin-bottom: 20px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    border: 1px solid rgba(0,0,0,0.1);
}

.question-text { 
    font-size: 16px; 
    font-weight: bold; 
    color: #000000; 
    margin-bottom: 15px; 
    line-height: 1.4; 
}

.option-item {
    display: flex;
    align-items: center;
    background: #f8f9fa;
    border: 1px solid #e9ecef;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    cursor: pointer;
    font-size: 14.5px;
    color: #212529;
    font-weight: 500;
    transition: all 0.2s;
}

.option-item:hover { 
    background: #e9ecef; 
}

.option-item input { margin-right: 12px; accent-color: #0072ff; width: 18px; height: 18px; cursor: pointer; }

.correct-style { background: #d4edda !important; border-color: #c3e6cb !important; color: #155724 !important; font-weight: bold; }
.incorrect-style { background: #f8d7da !important; border-color: #f5c6cb !important; color: #721c24 !important; }

.explanation-box {
    margin-top: 15px; padding: 12px 15px; background: #fff3cd;
    border-left: 4px solid #ffc107; border-radius: 4px; font-size: 13.5px; color: #856404; display: none;
}

/* 🟩 Floating Top Action Strip */
.middle-action-bar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    width: 100%;
    margin-bottom: 15px;
}

.excel-btn {
    background: linear-gradient(135deg, #1d6f42, #105230);
    color: #ffffff;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
    border: 1px solid rgba(255,255,255,0.25);
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.3s ease;
}

.excel-btn:hover {
    background: linear-gradient(135deg, #248a52, #13633a);
    border-color: #00f5d4;
    transform: scale(1.02);
}

.submit-container {
    display: flex;
    justify-content: center;
    margin: 30px 0;
}

.submit-btn {
    background: linear-gradient(135deg, #00bcff, #0072ff); color: #fff;
    padding: 14px 45px; font-size: 16px; font-weight: bold; border: none;
    border-radius: 25px; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 188, 255, 0.4);
}

.result-banner {
    display: none; background: linear-gradient(135deg, #051329, #0a2246);
    border: 1px solid #ffd166; border-radius: 14px; padding: 25px; text-align: center; margin-top: 25px;
}

.loading-box { text-align: center; padding: 40px; font-size: 18px; color: #ffe082; font-weight: bold; }
</style>
</head>
<body>

<div class="timer-box">⏳ Time Left: <span id="timeCounter">60:00</span></div>

<div class="container">
    <div class="header-box">
        <h1>Practice Examination Portal</h1>
        <p style="color: #b2ff59; font-size: 14px; font-weight: 500;">Live Google Sheets Secure Stream</p>
    </div>

    <div class="stats-container">
        <div class="stats-row">
            <div class="stats-card border-blue">Total Questions <span id="statQuestions">0</span></div>
            <div class="stats-card border-cyan">Attempted Items <span id="statAttempted">0</span></div>
            <div class="stats-card border-green">Correct Score <span id="statCorrect">0</span></div>
            <div class="stats-card border-green">Passing Ratio <span id="statRatio">0%</span></div>
        </div>
    </div>

    <div class="middle-action-bar">
        <button class="excel-btn" onclick="downloadStatsExcel()">📊 Download Stats Array (Excel)</button>
    </div>

    <form id="quizForm" onsubmit="evaluateQuiz(event)">
        <div id="dynamicQuestionsContainer">
            <div class="loading-box">⏳ Streaming exam paper directly from database matrices...</div>
        </div>

        <div class="submit-container">
            <button type="submit" id="submitButton" class="submit-btn" style="display:none;">💥 Submit Examination Paper</button>
        </div>
    </form>

    <div id="resultBanner" class="result-banner">
        <h3>Exam Summary Analysis</h3>
        <p id="scoreDisplay" style="font-size: 17px; line-height: 1.5;"></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTaXaD9w24-H0UnC8xPkC2b6rvVD89sVFURXwoylUdWolFq89fUZLh6WYfGKr_YtA/pub?gid=1558583524&single=true&output=csv";

let examQuestions = [];
let totalSeconds = 60 * 60; // 60 minutes default
let timerInterval = null;
let examSubmitted = false;

window.addEventListener('DOMContentLoaded', () => {
    // 🔒 Security Check: Lock screen permanently if they already submitted before
    if (localStorage.getItem("exam_status_submitted") === "true") {
        examSubmitted = true;
        document.getElementById("timeCounter").innerText = "00:00";
        document.querySelector(".timer-box").style.color = "#ff5252";
    }
    loadQuestionsFromSheet();
});

function initTimerMechanics() {
    if (examSubmitted) return;

    // Track time lapse through page refreshes using localStorage
    if (localStorage.getItem("exam_time_remaining")) {
        totalSeconds = parseInt(localStorage.getItem("exam_time_remaining"));
    } else {
        localStorage.setItem("exam_time_remaining", totalSeconds);
    }

    const display = document.getElementById("timeCounter");
    timerInterval = setInterval(() => {
        if (totalSeconds <= 0) {
            clearInterval(timerInterval);
            localStorage.setItem("exam_time_remaining", 0);
            alert("⏰ Time is up! Your answers are being compiled automatically.");
            autoForceSubmit();
            return;
        }

        totalSeconds--;
        localStorage.setItem("exam_time_remaining", totalSeconds);

        let minutes = Math.floor(totalSeconds / 60);
        let seconds = totalSeconds % 60;
        display.innerText = `${minutes < 10 ? "0" + minutes : minutes}:${seconds < 10 ? "0" + seconds : seconds}`;

        if (totalSeconds <= 300) {
            document.querySelector(".timer-box").style.color = "#ff5252";
            document.querySelector(".timer-box").style.borderColor = "#ff5252";
        }
    }, 1000);
}

function loadQuestionsFromSheet() {
    Papa.parse(csvURL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            let rawRows = results.data;
            
            examQuestions = rawRows.map(row => {
                let keys = Object.keys(row);
                let findVal = (terms) => {
                    let foundKey = keys.find(k => terms.some(t => k.toLowerCase().trim().includes(t)));
                    return foundKey ? row[foundKey].toString().trim() : "";
                };

                return {
                    section: findVal(["section", "subject", "category"]) || "General Studies",
                    question: findVal(["question", "text"]),
                    optionA: findVal(["optiona", "option a", "a"]),
                    optionB: findVal(["optionb", "option b", "b"]),
                    optionC: findVal(["optionc", "option c", "c"]),
                    optionD: findVal(["optiond", "option d", "d"]),
                    correct: findVal(["correct", "ans", "answer"]).toUpperCase(),
                    explanation: findVal(["explanation", "solution", "solve"]) || "No explanation attached."
                };
            }).filter(q => q.question !== "");

            if(examQuestions.length === 0) {
                document.getElementById("dynamicQuestionsContainer").innerHTML = "<div class='loading-box' style='color:#ff5252;'>❌ Empty Matrix: Check column headers names!</div>";
                return;
            }

            renderQuestions();
            
            if (!examSubmitted) {
                document.getElementById("submitButton").style.display = "block";
                initTimerMechanics();
                setupDashboardTrackers();
            } else {
                // If locking activated, instantly show graded feedback sheet layout
                autoForceSubmit();
            }
        }
    });
}

function renderQuestions() {
    const container = document.getElementById("dynamicQuestionsContainer");
    let currentSection = "";
    let htmlOutput = "";

    examQuestions.forEach((q, index) => {
        const qNum = index + 1;
        if (q.section !== currentSection) {
            currentSection = q.section;
            htmlOutput += `<h2 class="section-title">${currentSection}</h2>`;
        }

        htmlOutput += `
            <div class="question-card" data-correct="${q.correct}" data-index="${qNum}">
                <p class="question-text">Q${qNum}. ${q.question}</p>
                <div class="options-list">
                    <label class="option-item"><input type="radio" name="q_${qNum}" value="A" ${examSubmitted ? 'disabled' : ''}> A) ${q.optionA}</label>
                    <label class="option-item"><input type="radio" name="q_${qNum}" value="B" ${examSubmitted ? 'disabled' : ''}> B) ${q.optionB}</label>
                    <label class="option-item"><input type="radio" name="q_${qNum}" value="C" ${examSubmitted ? 'disabled' : ''}> C) ${q.optionC}</label>
                    <label class="option-item"><input type="radio" name="q_${qNum}" value="D" ${examSubmitted ? 'disabled' : ''}> D) ${q.optionD}</label>
                </div>
                <div class="explanation-box">💡 <strong>Explanation:</strong> ${q.explanation}</div>
            </div>`;
    });

    container.innerHTML = htmlOutput;
    document.getElementById("statQuestions").innerText = examQuestions.length;
}

function setupDashboardTrackers() {
    document.querySelectorAll(".option-item input").forEach(radio => {
        radio.addEventListener("change", () => {
            let checkedCount = document.querySelectorAll(`input[type="radio"]:checked`).length;
            document.getElementById("statAttempted").innerText = checkedCount;
            
            // Auto-cache selections into localStorage to handle unexpected context reload drops safely
            localStorage.setItem(radio.name, radio.value);
        });
    });

    // Repopulate answers if user refreshed middle of test
    examQuestions.forEach((_, i) => {
        let qNum = i + 1;
        let savedVal = localStorage.getItem(`q_${qNum}`);
        if (savedVal) {
            let targetRadio = document.querySelector(`input[name="q_${qNum}"][value="${savedVal}"]`);
            if (targetRadio) {
                targetRadio.checked = true;
                document.getElementById("statAttempted").innerText = document.querySelectorAll(`input[type="radio"]:checked`).length;
            }
        }
    });
}

function evaluateQuiz(event) {
    if (event) event.preventDefault();
    clearInterval(timerInterval);
    
    examSubmitted = true;
    localStorage.setItem("exam_status_submitted", "true");
    document.getElementById("submitButton").style.display = "none";

    let cards = document.querySelectorAll(".question-card");
    let score = 0;

    cards.forEach((card) => {
        let correctAnswer = card.getAttribute("data-correct").trim();
        // Fallback context lookups check local cached responses if live object drops
        let qNum = card.getAttribute("data-index");
        let cachedSelection = localStorage.getItem(`q_${qNum}`);
        
        let selectedInput = card.querySelector(`input[type="radio"]:checked`);
        let optionLabels = card.querySelectorAll(".option-item");
        let explanation = card.querySelector(".explanation-box");

        optionLabels.forEach(label => {
            let radio = label.querySelector('input');
            radio.disabled = true; // Lock inputs completely
            label.classList.remove("correct-style", "incorrect-style");
            
            if (radio.value === correctAnswer) {
                label.classList.add("correct-style");
            }
            
            // Repopulate tracking from cache if page was forced refreshed post submission
            if (!selectedInput && cachedSelection && radio.value === cachedSelection) {
                radio.checked = true;
                selectedInput = radio;
            }
        });

        if (selectedInput) {
            if (selectedInput.value === correctAnswer) {
                score++;
            } else {
                selectedInput.parentElement.classList.add("incorrect-style");
            }
        }
        if (explanation) explanation.style.display = "block";
    });

    // Update Dashboard Values Elements
    let attemptCount = document.querySelectorAll(`input[type="radio"]:checked`).length;
    document.getElementById("statAttempted").innerText = attemptCount;
    document.getElementById("statCorrect").innerText = score;
    let ratioPercentage = ((score / cards.length) * 100).toFixed(1);
    document.getElementById("statRatio").innerText = `${ratioPercentage}%`;

    let banner = document.getElementById("resultBanner");
    let display = document.getElementById("scoreDisplay");
    display.innerHTML = `Submission Lock Activated.<br>Correct Answers Matrix: <strong>${score}</strong> / <strong>${cards.length}</strong>.<br>Passing Ratio Metric: <strong>${ratioPercentage}%</strong>`;
    banner.style.display = "block";
    
    if (event) banner.scrollIntoView({ behavior: 'smooth' });
}

function autoForceSubmit() {
    evaluateQuiz(null);
}

// 📊 SheetJS implementation for structured exam statistics compilation metrics
function downloadStatsExcel() {
    let quizCards = document.querySelectorAll(".question-card");
    let diagnosticExportRows = [];

    quizCards.forEach((card) => {
        let qNum = card.getAttribute("data-index");
        let qText = card.querySelector(".question-text").innerText;
        let rightAns = card.getAttribute("data-correct");
        
        let checkedInput = card.querySelector(`input[type="radio"]:checked`);
        let studentAns = checkedInput ? checkedInput.value : "UNATTEMPTED";
        let trackingStatus = (studentAns === rightAns) ? "CORRECT" : (studentAns === "UNATTEMPTED" ? "SKIPPED" : "WRONG");

        diagnosticExportRows.push({
            "Question Number": `Q${qNum}`,
            "Question Details": qText.replace(/^Q\d+\.\s*/, ""),
            "Student Selected Option": studentAns,
            "Correct Answer Key": rightAns,
            "Evaluation Status Mapping": trackingStatus
        });
    });

    if (diagnosticExportRows.length === 0) {
        alert("Evaluation matrix profiles are completely empty!");
        return;
    }

    let worksheet = XLSX.utils.json_to_sheet(diagnosticExportRows);
    let workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Student Performance");
    XLSX.writeFile(workbook, "MGIT_Exam_Performance_Stats.xlsx");
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MGIT - Secure Examination Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    padding: 15px;
    padding-bottom: 80px; 
    overflow-x: hidden;
    color: white;
    background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c3c);
    background-size: 400% 400%;
    animation: bgMove 15s ease infinite;
    min-height: 100vh;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container { max-width: 900px; margin: 0 auto; padding-bottom: 60px; position: relative; }

.timer-box {
    position: fixed;
    top: 20px;
    right: 20px;
    background: linear-gradient(135deg, #000814, #001d3d);
    border: 2px solid #ff9f1c;
    padding: 10px 18px;
    border-radius: 30px;
    box-shadow: 0 6px 25px rgba(0,0,0,0.5);
    font-size: 16px;
    font-weight: bold;
    color: #ff9f1c;
    z-index: 2000;
    display: flex;
    align-items: center;
    gap: 8px;
}

.header-box {
    background: linear-gradient(135deg, #000814, #001d3d, #003566);
    padding: 20px 15px;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.15);
    margin-bottom: 20px;
    cursor: pointer; /* Allows you to double-click here to login */
}

h1 {
    font-size: 34px;
    font-weight: bold;
    background: linear-gradient(90deg, #ffffff, #ffe082, #ffffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* 🔒 HIDDEN BY DEFAULT: Admin Control Deck */
#adminPanelDeck {
    display: none; 
}

.stats-container {
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #051329, #0a2246);
    padding: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    gap: 8px;
    margin-bottom: 20px;
}

.stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 8px;
    width: 100%;
}

.stats-card {
    background: rgba(255, 255, 255, 0.06);
    border-radius: 8px;
    padding: 8px;
    font-size: 11px;
    line-height: 1.2;
    color: #e0e6ed;
    display: flex;
    flex-direction: column;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.stats-card span {
    font-weight: bold;
    font-size: 16px;
    margin-top: 2px;
}

.border-blue { border: 1px solid #00bcff; }
.border-blue span { color: #00bcff; }
.border-green { border: 1px solid #38b000; }
.border-green span { color: #00ff66; }
.border-red { border: 1px solid #ff5252; }
.border-red span { color: #ff5252; }
.border-amber { border: 1px solid #ffd166; }
.border-amber span { color: #ffd166; }

.section-title {
    font-size: 22px;
    margin: 35px 0 15px 0;
    padding-bottom: 6px;
    border-bottom: 2px solid #00bcff;
    color: #00f5d4;
}

.question-card {
    background: #ffffff;
    border-radius: 12px;
    padding: 22px;
    margin-bottom: 20px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    border: 1px solid rgba(0,0,0,0.1);
}

.question-text { 
    font-size: 16px; 
    font-weight: bold; 
    color: #000000; 
    margin-bottom: 15px; 
}

.option-item {
    display: flex;
    align-items: center;
    background: #f8f9fa;
    border: 1px solid #e9ecef;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    cursor: pointer;
    font-size: 14.5px;
    color: #212529;
    transition: all 0.2s;
}

.option-item:hover { background: #e9ecef; }
.option-item input { margin-right: 12px; accent-color: #0072ff; width: 18px; height: 18px; }

.correct-style { background: #d4edda !important; border-color: #c3e6cb !important; color: #155724 !important; font-weight: bold; }
.incorrect-style { background: #f8d7da !important; border-color: #f5c6cb !important; color: #721c24 !important; }

.explanation-box {
    margin-top: 15px; padding: 12px 15px; background: #fff3cd;
    border-left: 4px solid #ffc107; border-radius: 4px; font-size: 13.5px; color: #856404; display: none;
}

.middle-action-bar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    width: 100%;
    margin-bottom: 15px;
}

.excel-btn {
    background: linear-gradient(135deg, #1d6f42, #105230);
    color: #ffffff;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
    border: 1px solid rgba(255,255,255,0.25);
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    gap: 6px;
}

.submit-container { display: flex; justify-content: center; margin: 30px 0; }
.submit-btn {
    background: linear-gradient(135deg, #00bcff, #0072ff); color: #fff;
    padding: 14px 45px; font-size: 16px; font-weight: bold; border: none;
    border-radius: 25px; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 188, 255, 0.4);
}

.result-banner {
    display: none; background: linear-gradient(135deg, #051329, #0a2246);
    border: 1px solid #ffd166; border-radius: 14px; padding: 25px; text-align: center; margin-top: 25px;
}
.loading-box { text-align: center; padding: 40px; font-size: 18px; color: #ffe082; font-weight: bold; }
</style>
</head>
<body>

<div class="timer-box">⏳ Time Left: <span id="timeCounter">60:00</span></div>

<div class="container">
    <div class="header-box" ondblclick="triggerAdminLogin()">
        <h1>Practice Examination Portal</h1>
        <p style="color: #b2ff59; font-size: 14px; font-weight: 500;">MGIT Secure Screening System</p>
    </div>

    <div id="adminPanelDeck">
        <div class="stats-container">
            <div style="font-size: 13px; color: #ffd166; font-weight: bold; text-align: center; margin-bottom: 4px;">📊 ADMIN PERFORMANCE METRIC MATRIX</div>
            <div class="stats-row">
                <div class="stats-card border-blue">Total Questions <span id="statQuestions">0</span></div>
                <div class="stats-card border-amber">Attempted <span id="statAttempted">0</span></div>
                <div class="stats-card border-green">Correct Count <span id="statCorrect">0</span></div>
                <div class="stats-card border-red">Wrong Count <span id="statWrong">0</span></div>
                <div class="stats-card border-green">Passing % <span id="statRatio">0%</span></div>
            </div>
        </div>

        <div class="middle-action-bar">
            <button class="excel-btn" onclick="downloadStatsExcel()">📊 Download Stats Array (Excel)</button>
        </div>
    </div>

    <form id="quizForm" onsubmit="evaluateQuiz(event)">
        <div id="dynamicQuestionsContainer">
            <div class="loading-box">⏳ Streaming exam paper directly from database matrices...</div>
        </div>

        <div class="submit-container">
            <button type="submit" id="submitButton" class="submit-btn" style="display:none;">💥 Submit Examination Paper</button>
        </div>
    </form>

    <div id="resultBanner" class="result-banner">
        <h3>Exam Summary Analysis</h3>
        <p id="scoreDisplay" style="font-size: 17px; line-height: 1.5;"></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTaXaD9w24-H0UnC8xPkC2b6rvVD89sVFURXwoylUdWolFq89fUZLh6WYfGKr_YtA/pub?gid=1558583524&single=true&output=csv";

let examQuestions = [];
let totalSeconds = 60 * 60; 
let timerInterval = null;
let examSubmitted = false;

window.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem("exam_status_submitted") === "true") {
        examSubmitted = true;
        document.getElementById("timeCounter").innerText = "00:00";
    }
    loadQuestionsFromSheet();
});

// 🔐 Admin Verification Trigger
function triggerAdminLogin() {
    let password = prompt("🔑 Enter Administrator Security Access Key:");
    if (password === "1234") { // Change this string value to your custom passkey
        document.getElementById("adminPanelDeck").style.display = "block";
        alert("🔓 Access granted. Admin Metrics Board unlocked successfully.");
    } else {
        alert("❌ Unauthorized. Incorrect access code.");
    }
}

function initTimerMechanics() {
    if (examSubmitted) return;
    if (localStorage.getItem("exam_time_remaining")) {
        totalSeconds = parseInt(localStorage.getItem("exam_time_remaining"));
    }

    const display = document.getElementById("timeCounter");
    timerInterval = setInterval(() => {
        if (totalSeconds <= 0) {
            clearInterval(timerInterval);
            alert("⏰ Time is up! Your answers are being compiled automatically.");
            evaluateQuiz(null);
            return;
        }
        totalSeconds--;
        localStorage.setItem("exam_time_remaining", totalSeconds);
        let m = Math.floor(totalSeconds / 60);
        let s = totalSeconds % 60;
        display.innerText = `${m < 10 ? "0" + m : m}:${s < 10 ? "0" + s : s}`;
    }, 1000);
}

function loadQuestionsFromSheet() {
    Papa.parse(csvURL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            examQuestions = results.data.map(row => {
                let keys = Object.keys(row);
                let findVal = (terms) => {
                    let foundKey = keys.find(k => terms.some(t => k.toLowerCase().trim().includes(t)));
                    return foundKey ? row[foundKey].toString().trim() : "";
                };
                return {
                    section: findVal(["section", "subject", "category"]) || "General Studies",
                    question: findVal(["question", "text"]),
                    optionA: findVal(["optiona", "option a", "a"]),
                    optionB: findVal(["optionb", "option b", "b"]),
                    optionC: findVal(["optionc", "option c", "c"]),
                    optionD: findVal(["optiond", "option d", "d"]),
                    correct: findVal(["correct", "ans", "answer"]).toUpperCase(),
                    explanation: findVal(["explanation", "solution", "solve"]) || "No explanation attached."
                };
            }).filter(q => q.question !== "");

            renderQuestions();
            if (!examSubmitted) {
                document.getElementById("submitButton").style.display = "block";
                initTimerMechanics();
            } else {
                evaluateQuiz(null);
            }
        }
    });
}

function renderQuestions() {
    const container = document.getElementById("dynamicQuestionsContainer");
    let currentSection = ""; let htmlOutput = "";

    examQuestions.forEach((q, index) => {
        const qNum = index + 1;
        if (q.section !== currentSection) {
            currentSection = q.section;
            htmlOutput += `<h2 class="section-title">${currentSection}</h2>`;
        }
        htmlOutput += `
            <div class="question-card" data-correct="${q.correct}" data-index="${qNum}">
                <p class="question-text">Q${qNum}. ${q.question}</p>
                <div class="options-list">
                    <label class="option-item"><input type="radio" name="q_${qNum}" value="A" ${examSubmitted ? 'disabled' : ''}> A) ${q.optionA}</label>
                    <label class="option-item"><input type="radio" name="q_${qNum}" value="B" ${examSubmitted ? 'disabled' : ''}> B) ${q.optionB}</label>
                    <label class="option-item"><input type="radio" name="q_${qNum}" value="C" ${examSubmitted ? 'disabled' : ''}> C) ${q.optionC}</label>
                    <label class="option-item"><input type="radio" name="q_${qNum}" value="D" ${examSubmitted ? 'disabled' : ''}> D) ${q.optionD}</label>
                </div>
                <div class="explanation-box">💡 <strong>Explanation:</strong> ${q.explanation}</div>
            </div>`;
    });
    container.innerHTML = htmlOutput;
    document.getElementById("statQuestions").innerText = examQuestions.length;
}

function evaluateQuiz(event) {
    if (event) event.preventDefault();
    clearInterval(timerInterval);
    
    examSubmitted = true;
    localStorage.setItem("exam_status_submitted", "true");
    document.getElementById("submitButton").style.display = "none";

    let cards = document.querySelectorAll(".question-card");
    let correctCount = 0;
    let wrongCount = 0;
    let attemptedCount = 0;

    cards.forEach((card) => {
        let correctAnswer = card.getAttribute("data-correct").trim();
        let selectedInput = card.querySelector(`input[type="radio"]:checked`);
        let optionLabels = card.querySelectorAll(".option-item");
        let explanation = card.querySelector(".explanation-box");

        optionLabels.forEach(label => {
            let radio = label.querySelector('input');
            radio.disabled = true;
            if (radio.value === correctAnswer) label.classList.add("correct-style");
        });

        if (selectedInput) {
            attemptedCount++;
            if (selectedInput.value === correctAnswer) {
                correctCount++;
            } else {
                wrongCount++;
                selectedInput.parentElement.classList.add("incorrect-style");
            }
        }
        if (explanation) explanation.style.display = "block";
    });

    // 📈 Compute Metrics Math
    let totalQuestions = cards.length;
    let ratioPercentage = ((correctCount / totalQuestions) * 100).toFixed(1);

    // Update Hidden Stats Panel Elements
    document.getElementById("statAttempted").innerText = attemptedCount;
    document.getElementById("statCorrect").innerText = correctCount;
    document.getElementById("statWrong").innerText = wrongCount;
    document.getElementById("statRatio").innerText = `${ratioPercentage}%`;

    let banner = document.getElementById("resultBanner");
    let display = document.getElementById("scoreDisplay");
    display.innerHTML = `Submission Received.<br>Correct Items: <strong>${correctCount}</strong> | Wrong Items: <strong>${wrongCount}</strong><br>Passing Accuracy: <strong>${ratioPercentage}%</strong>`;
    banner.style.display = "block";
}

function downloadStatsExcel() {
    let quizCards = document.querySelectorAll(".question-card"); let diagnosticExportRows = [];
    quizCards.forEach((card) => {
        let qNum = card.getAttribute("data-index");
        let rightAns = card.getAttribute("data-correct");
        let checkedInput = card.querySelector(`input[type="radio"]:checked`);
        let studentAns = checkedInput ? checkedInput.value : "UNATTEMPTED";
        diagnosticExportRows.push({
            "Question": `Q${qNum}`,
            "Student Answer": studentAns,
            "Correct Key": rightAns,
            "Status": (studentAns === rightAns) ? "CORRECT" : (studentAns === "UNATTEMPTED" ? "SKIPPED" : "WRONG")
        });
    });
    let worksheet = XLSX.utils.json_to_sheet(diagnosticExportRows);
    let workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Performance Summary");
    XLSX.writeFile(workbook, "Student_Exam_Result.xlsx");
}
</script>
</body>
</html>
